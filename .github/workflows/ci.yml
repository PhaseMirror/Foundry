name: CI – Sedona Spine WASM + Kani + Artifact

on:
  workflow_call:
    inputs:
      rust_toolchain:
        required: false
        type: string
        default: stable
      wasm_target:
        required: false
        type: string
        default: wasm32-unknown-unknown

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt,clippy

      - name: Add wasm32-unknown-unknown target
        run: rustup target add ${{ inputs.wasm_target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126

      - name: Build Sedona Spine (wasm32-unknown-unknown, release)
        run: |
          cargo build \
            --manifest-path lean/Core/prime_tensors/sedona_spine/Cargo.toml \
            --target ${{ inputs.wasm_target }} \
            --release

      - name: Generate WASM glue (wasm-bindgen)
        run: |
          wasm-bindgen \
            --target web \
            --out-dir models/legalese-scopist/pkg \
            target/${{ inputs.wasm_target }}/release/sedona_spine.wasm

      - name: Install Kani (static analyzer)
        run: cargo install kani-cli --version 0.53.0 || true

      - name: Run Kani verification
        run: |
          cargo kani --manifest-path models/legalese-scopist/Cargo.toml \
            --target ${{ inputs.wasm_target }}

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sedona_spine_pkg
          path: models/legalese-scopist/pkg
          retention-days: 30
