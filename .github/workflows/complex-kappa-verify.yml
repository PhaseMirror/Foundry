name: Complex-Kappa Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sorry-check:
    name: Zero-Sorry Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean4@v4.32.0-rc1
      - run: lake build
      - name: Check for sorry/admit in ComplexKappa
        run: |
          if grep -rn "sorry\|admit" src/ComplexKappa/; then
            echo "::error::Found sorry or admit in ComplexKappa Lean code"
            exit 1
          fi
          echo "✓ Zero-sorry check passed"

  lean-build:
    name: Lean 4 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean4@v4.32.0-rc1
      - run: lake build
      - run: lake test

  rust-build:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
      - run: cargo test -p complex-kappa --no-fail-fast
      - run: cargo clippy -p complex-kappa -- -D warnings

  kani-verify:
    name: Kani Bounded Model Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
      - run: cargo install kani-verifier
      - run: cargo kani -p complex-kappa
        timeout-minutes: 30

  integration:
    name: Integration Gate
    runs-on: ubuntu-latest
    needs: [sorry-check, lean-build, rust-build, kani-verify]
    steps:
      - run: echo "All verification gates passed."
