name: Evaluate PR with Sigma Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run MCP Evaluator
        uses: ./.github/actions/mcp-evaluator
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
