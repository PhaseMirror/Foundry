name: Lean 4 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build and Test Lean
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/download/v3.1.1/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain leanprover/lean4:v4.32.0-rc1
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build Project
        working-directory: .
        run: lake build

      - name: Run Tests
        working-directory: .
        run: lake test
