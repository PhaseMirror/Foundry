name: Lean CI

on:
  workflow_call:
    inputs:
      lean_version:
        required: false
        type: string
        default: v4.32.0
      build_script:
        required: false
        type: string
        default: build_all.sh

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lean/projects
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/download/v3.1.1/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain leanprover/lean4:${{ inputs.lean_version }}
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache elan packages
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-${{ inputs.lean_version }}-${{ hashFiles('**/lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-elan-${{ inputs.lean_version }}-

      - name: Run build script
        run: |
          chmod +x ../../${{ inputs.build_script }}
          ../../${{ inputs.build_script }}
