# Lean 4 Toolchain Configuration
# Universal Closure Theory

[package]
name = "universal-closure"
version = "0.1.0"
description = "Universal Closure Theory - Formal Verification Framework"
lean_version = "leanprover/lean4:v4.28.0"

[dependencies]
mathlib = { git = "https://github.com/leanprover-community/mathlib4", tag = "v4.28.0" }

[build]
olean_compression = true
threads = 4

[dev-dependencies]
test = { git = "https://github.com/leanprover-community/test4" }

[[bin]]
name = "verify-all"
path = "scripts/verify-all.sh"
