[workspace]
members = [
  "crates/kernel-core",
  "crates/kernel-cli",
  "crates/xtask"
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "1.0.0-alpha"
authors = ["Multiplicity Foundation"]
rust-version = "1.78"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
petgraph = "0.6"
regex = "1"
once_cell = "1"
assert_cmd = "2"
predicates = "3"
tempfile = "3"
