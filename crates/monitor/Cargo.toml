[package]
name = "pirtm-monitor"
version = "1.0.0-alpha"
edition = "2021"
description = "PIRTM monitoring and telemetry"

[[bin]]
name = "pirtm-monitor"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
thiserror = "1.0"
log = "0.4"
env_logger = "0.10"


[dev-dependencies]
tempfile = "3"
