[package]
name = "mtpi-rs"
version = "1.0.0-alpha"
edition = "2024"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1.15", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = "2.1"
num-bigint = { version = "0.4", features = ["serde"] }
num-prime = "0.4"
async-trait = "0.1"
sha2 = "0.10"
sha3 = "0.10"
hex = "0.4"
ark-ff = "0.5.0"
ark-bn254 = "0.5.0"
ark-crypto-primitives = { version = "0.5.0", features = ["snark"] }
light-poseidon = "0.4.0"
num-integer = "0.1.46"
