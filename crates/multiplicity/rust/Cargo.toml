[package]
name = "multiplicity-meta-ensemble"
version = "1.0.0-alpha"
edition = "2021"
license = "MIT"
description = "Phase Mirror Verified Substrates - Meta Ensemble"

[lib]
name = "multiplicity_meta_ensemble"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ndarray = "0.15"
faer = "0.19"
anyhow = "1.0"
rand = "0.8"
rand_chacha = "0.3"
sha2 = "0.10"
blake3 = "1.5"
resonance-rs = { path = "../../resonance" }
