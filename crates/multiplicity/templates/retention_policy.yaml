# Retention Policy Template (YAML)
# This template defines retention durations and litigation‑hold flags for
# Electronic Stored Information (ESI) as required by the Sedona Spine.
# Packages should copy this file into their `templates/` directory and
# adjust values per domain‑specific needs.

default_retention_days: 365  # default retention period if not overridden

# Example overrides per data category
categories:
  emails:
    retention_days: 730
    litigation_hold: false
  contracts:
    retention_days: 1825
    litigation_hold: true
  logs:
    retention_days: 180
    litigation_hold: false

# Policy‑driven risk levels – the engine computes these and the UI renders them.
# Do NOT edit risk enum values; they must match the engine output (Critical, High, Medium).
risk_levels:
  critical: "Critical"
  high: "High"
  medium: "Medium"
