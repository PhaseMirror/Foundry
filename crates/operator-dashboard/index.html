<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PhaseSpace OS</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background-color: #0d0f12;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .glass-panel {
        background: rgba(22, 26, 31, 0.7);
        padding: 32px;
        border-radius: 12px;
        border: 1px solid #1e293b;
        box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.3);
      }
      .btn {
        background: #38bdf8;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      .metrics { color: #38bdf8; }
      .error { color: #ef4444; }
      .success { color: #10b981; }
    </style>
  </head>
  <body></body>
</html>
