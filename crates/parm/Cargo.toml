[package]
name = "parm-rs"
version = "1.0.0-alpha"
edition = "2024"

[dependencies]
csv = "1.4.0"
itertools = "0.14.0"
quick-xml = { version = "0.40.1", features = ["serialize", "serde"] }
rand = { version = "0.10.1", features = ["std", "thread_rng"], default-features = false }
rand_distr = "0.6.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_derive = "1.0.228"
serde_json = "1.0.150"
