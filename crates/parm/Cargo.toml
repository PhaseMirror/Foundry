[package]
name = "parm"
version = "1.0.0-alpha"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.18"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
bytemuck = { version = "1.14", features = ["derive"] }
archivum = { path = "../archivum", optional = true }
csv = "1.3"
quick-xml = { version = "0.31", features = ["serialize"] }
rand = "0.8"
rand_distr = "0.4"

[dev-dependencies]

[features]
# Enable Kani verification harnesses
kani = []
# Enable Archivum integration
archivum = ["dep:archivum"]
# Enable Triple-Lock governance integration
triple-lock = ["archivum"]
