[package]
name = "pirtm-candle"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["Phase Mirror Contributors"]
license = "MIT OR Apache-2.0"
description = "Candle-based TinyLlama wrapper with Sedona Spine Lambda_m contractive governance"

[dependencies]
candle-core = "0.11"
candle-nn = "0.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
sha2 = "0.10"
hex = "0.4"
rand = "0.8"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
