[package]
name = "pirtm-tensor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
# Enable Kani verification harnesses. The `kani` crate is provided by the
# `cargo kani` verification sysroot (not crates.io); the CSL bounding proofs in
# `tests/kani_csl_bounds.rs` are gated on this feature and excluded from
# ordinary `cargo build`/`cargo test`.
kani = []

[dev-dependencies]
proptest = "1.4"

[dependencies]
ndarray = "0.16"
num-complex = "0.4.6"
