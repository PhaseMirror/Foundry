[package]
name = "pirtm-web-sdk"
version = "1.0.0-alpha"
edition = "2021"
description = "Governed WebAssembly SDK and Component Builder for PIRTM"
authors = ["PhaseSpace"]

[dependencies]
clap = { version = "4.4", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.37", features = ["full", "process"] }
