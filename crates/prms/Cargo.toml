[package]
name = "prms"
version = "0.1.0"
edition = "2021"

[dependencies]
bincode = "1.3.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.11.0"
thiserror = "2.0.18"
chrono = { version = "0.4", features = ["serde"] }
bytemuck = { version = "1.14", features = ["derive"] }
archivum = { path = "../archivum", optional = true }

[dev-dependencies]

[features]
# Enable Archivum integration
archivum = ["dep:archivum"]
# Enable Triple-Lock governance integration
triple-lock = ["archivum"]
# Enable Kani verification harnesses
kani = []
