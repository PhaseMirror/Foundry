[package]
name = "prover"
version = "0.1.0"
edition = "2021"

[dependencies]
goldilocks = { path = "../goldilocks" }
air-mr64 = { path = "../air-mr64" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha3 = "0.10"
hex = "0.4"
thiserror = "1.0"
rayon = { version = "1.8", optional = true }
bytemuck = "1.14"

[features]
default = ["parallel"]
parallel = ["dep:rayon"]
