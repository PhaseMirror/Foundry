
[package]
name = "q-calculator-rs"
version = "1.0.0-alpha"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
nalgebra = { version = "0.34.2", features = ["serde-serialize"] }
ndarray = { version = "0.17.2", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2.89"
serde-wasm-bindgen = "0.6.3"
js-sys = "0.3.66"
console_error_panic_hook = "0.1.7"
