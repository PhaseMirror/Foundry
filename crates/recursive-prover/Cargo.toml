[package]
name = "recursive-prover"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "wrap-proof"
path = "src/main.rs"

[[bin]]
name = "aggregate-proofs"
path = "src/bin/aggregate_proofs.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
blake3 = "1.3"
serde_json = "1.0"
anyhow = "1.0"
num-bigint = "0.4"
num-traits = "0.2"
sha3 = "0.10"
hex = "0.4"
goldilocks = { path = "../goldilocks" }
prover = { path = "../prover" }
pasta-curves = { path = "../pasta-curves" }

[dev-dependencies]

[build-dependencies]
sha2 = "0.10"
regex = "1.10"
