[package]
name = "riemann-zeta"
version = "1.0.0-alpha"
edition = "2024"

[dependencies]
rug = { version = "1.26", features = ["serde", "complex"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1.5"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

[lib]
name = "riemann_zeta"
path = "src/lib.rs"

[[bin]]
name = "compute_zeros"
path = "src/bin/compute_zeros.rs"
