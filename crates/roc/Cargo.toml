[package]
name = "roc"
version = "1.0.0-alpha"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.18"
blake3 = "1.5.1"
chrono = "0.4.45"

[dev-dependencies]

[dependencies.archivum]
path = "../archivum"
optional = true

[features]
archivum = ["dep:archivum"]
triple-lock = ["archivum"]
