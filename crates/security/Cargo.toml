[package]
name = "security-rs"
version = "1.0.0-alpha"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
thiserror = "2.0.18"
uuid = { version = "1.23.1", features = ["serde", "v4"] }

[dev-dependencies]
tempfile = "3.27.0"
