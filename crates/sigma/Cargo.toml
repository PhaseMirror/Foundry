[package]
name = "sigma"
version = "0.1.0"
edition = "2021"

[dependencies]
archivum = { path = "../archivum" }
mirror-dissonance = { path = "../mirror-dissonance" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { version = "1.0", features = ["alloc"] }
bincode = "2.0.0-rc.3"
thiserror = "1.0"
tracing = "0.1"
chrono = "0.4"

[features]
default = ["lean-gen"]
lean-gen = []

