[package]
name = "sigma"
version = "0.1.0"
edition = "2021"

[dependencies]
archivum = { path = "../archivum" }
mirror-dissonance = { package = "mirror-dissonance-rs", path = "../mirror-dissonance" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { version = "1.0", features = ["alloc"] }
bincode = "2.0.0-rc.3"
thiserror = "1.0"
tracing = "0.1"
chrono = "0.4"
blake3 = "1.5"
hex = "0.4"

[dev-dependencies]
[features]
default = []
lean-gen = []

