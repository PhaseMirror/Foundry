[package]
name = "sp1-wasm"
version = "1.0.0-alpha"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
sp1-verifier = "=6.0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
anyhow = "1.0.102"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
