[package]
name = "wasm-bridge"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hex = "0.4"
postcard = { version = "1.0", features = ["alloc"] }
pirtm-stdlib = { path = "../pirtm-stdlib" }
[dev-dependencies]
proptest = "1.0"
[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
panic = 'abort'
