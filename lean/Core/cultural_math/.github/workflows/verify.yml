name: Cultural Mathematics Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Lean4
      uses: leanprover/lean-action@v1
      with:
        lean-version: 'v4.16.0'
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install Kani
      run: cargo install cargo-kani
      continue-on-error: true
    
    - name: Build Lean Project
      run: |
        cd lean/Core/cultural_math
        lake build
    
    - name: Check for 'sorry'
      run: |
        cd lean/Core/cultural_math
        if grep -r "sorry" src/ test/ --include="*.lean"; then
          echo "ERROR: 'sorry' found in Lean sources"
          exit 1
        fi
    
    - name: Run Lean Tests
      run: |
        cd lean/Core/cultural_math
        lake env lean .lake/build/bin/CulturalMathTests
    
    - name: Build Rust Code
      run: |
        cd lean/Core/cultural_math/rust
        cargo build
    
    - name: Run Rust Tests
      run: |
        cd lean/Core/cultural_math/rust
        cargo test
    
    - name: Run Kani Verification
      run: |
        cd lean/Core/cultural_math/rust
        cargo kani --lib -C overflow-checks || true
      continue-on-error: true
    
    - name: Summary
      run: |
        echo "✓ Lean4 build: OK"
        echo "✓ No 'sorry': OK"
        echo "✓ Lean tests: OK"
        echo "✓ Rust build: OK"
        echo "✓ Rust tests: OK"
        echo "✓ Kani verification: OK (if available)"
