[package]
name = "cultural-math-rust"
version = "0.1.0"
edition = "2021"
description = "Verified implementations of cultural mathematics algorithms"

[lib]
name = "cultural_math"
path = "src/lib.rs"

[[bin]]
name = "cultural-math-tests"
path = "src/main.rs"

[dependencies]
kani = { version = "0.0.1", optional = true }

[dev-dependencies]
kani = "0.0.1"

[features]
default = []
kani-verify = ["kani"]
