servers:
  - id: commander
    transport: stdio
    binary: target/debug/multiplicity-commander-cli
    trust: internal
    governed: true
    attested_sha256: "<fill-after-attestation>"
  - id: opencode
    transport: stdio
    binary: /usr/local/bin/opencode
    trust: internal
    governed: false
    attested_sha256: "<fill-after-attestation>"
    warning: "Planner only. No direct filesystem, git, or shell authority."
  - id: ollama
    transport: http
    base_url: http://localhost:11434
    trust: internal
    governed: false
    warning: "Inference server only. Never a policy boundary."
