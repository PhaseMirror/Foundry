app-id: com.citizengardens.agiOS
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: pm-launcher
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=x11
  - --device=all
  - --device=dri
  - --filesystem=xdg-documents/PhaseMirror:create
  - --talk-name=org.freedesktop.Notifications
  - --metadata=X-D-Bus-Proxy=true

modules:
   - name: openssl
     buildsystem: autotools
     build-options:
       cflags: "-O3 -fPIC"
     sources:
       - type: archive
         url: https://www.openssl.org/source/openssl-3.0.13.tar.gz
         sha256: 88525753f14f165663aef9d0d3810a4781474360f9d05908b78cf9527ec5ec4e
     cleanup:
       - /bin/openssl
       - /include/openssl
       - /lib/pkgconfig

   - name: agios-core
     buildsystem: simple
     build-options:
       append-path: /usr/lib/sdk/rust-stable/bin
       env:
         OPENSSL_DIR: /app
         OPENSSL_STATIC: "1"
         RUSTFLAGS: "-C target-feature=+aes,+ssse3 -C opt-level=3"
         CARGO_HOME: /cargo
         CARGO_NET_OFFLINE: "true"
     build-commands:
       - mkdir -p /cargo/registry
       - cp -r Governance/vendor/workspace/* /cargo/registry/
       - cargo build --offline --release --manifest-path "Phase Mirror/phase-mirror-mcp/Cargo.toml"
       - install -D "target/release/phase-mirror-mcp" /app/bin/pm
     sources:
       - type: dir
         path: .

   - name: clinical-dashboard
     buildsystem: simple
     build-commands:
       - npm install
       - ./node_modules/.bin/ng build --configuration production
       - mkdir -p /app/share/workbench
       - cp -r dist/app/browser/* /app/share/workbench/
       - install -D scripts/flatpak/agiOS-launcher.sh /app/bin/pm-launcher
     sources:
       - type: dir
         path: workbench

   - name: metadata-integration
     buildsystem: simple
     build-commands:
       - install -D com.citizengardens.agiOS.desktop /app/share/applications/com.citizengardens.agiOS.desktop
       - install -D com.citizengardens.agiOS.svg /app/share/icons/hicolor/scalable/apps/com.citizengardens.agiOS.svg
     sources:
       - type: file
         path: com.citizengardens.agiOS.desktop
       - type: file
         path: com.citizengardens.agiOS.svg