apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-atlas-config
  namespace: phase-mirror
  labels:
    app: phase-mirror-operator
data:
  # The Kubernetes ConfigMap simply mirrors the exact YAML policies defined in materia_commons.
  # This provides the execution engine with the declarative Tier V rules without hardcoding them.
  tier5_social_physics.yaml: |
    operator_id: "Sigma_Civic"
    tier: "V"
    domain: "governance.civic_infrastructure"
    symmetry_constraints:
      monster_representation: "196884-dimensional"
      max_character_deviation: 1e-5
    rta_metric:
      enabled: true
      max_rta_dist_to_bindu: 0.01
      max_arta_defect: 1e-5
      run_fit_on_update: true
      fit_tolerance: 1e-7
    crmf_bounds:
      max_lipschitz_constant: 0.95
      safety_margin: 0.05
      target_contraction_bound: 0.95
    sentinel_gates:
      - L0_08_PrimeOneForbidden
      - L1_TopologicalConnectivity
      - L2_SemanticCoherence
      - L3_MonsterSymmetryConfinement
    audit_config:
      emit_crmf_witness: true
      anchor_to_blockchain: true
      frequency: "per_transition"
      expose_rta_endpoints: true
