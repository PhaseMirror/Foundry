# Operator Atlas: Tier V Social Physics Declaration
# This profile defines the maximum geometric and semantic strictness for DAO/Civic structural configurations approximating the Monster group representation.

operator_id: "Sigma_Civic"
tier: "V"
domain: "governance.civic_infrastructure"

# Monstrous Symmetry Mapping
symmetry_constraints:
  # The target irreducible representation of the Monster group to approximate
  monster_representation: "196884-dimensional"
  # Threshold measuring how closely the civic structure maps to the target irrep character
  max_character_deviation: 1e-5

# The Universal Multiplicity Constant / Rta Configuration
rta_metric:
  enabled: true
  # Maximum allowed Euclidean distance from the Bindu (the Monster's Identity representation)
  max_rta_dist_to_bindu: 0.01
  # The maximum allowable semantic discrepancy (sheaf overlap failure) before candidate clamping.
  max_arta_defect: 1e-5
  # Enforce gradient descent (Fit operator) to auto-minimize defect toward Monster symmetry
  run_fit_on_update: true
  # Threshold for Fit operator termination.
  fit_tolerance: 1e-7

# CRMF (Contractive Resonance Mapping Framework) Bounds
crmf_bounds:
  # The strict Lipschitz bound on the neural network Jacobian to guarantee bounded resonance.
  max_lipschitz_constant: 0.95
  # Minimum margin required below the critical safety threshold (gamma).
  safety_margin: 0.05
  # Required contraction bound (must be < 1.0 to ensure exponential convergence to Bindu).
  target_contraction_bound: 0.95

# Sentinel Gate Config
sentinel_gates:
  - L0_08_PrimeOneForbidden
  - L1_TopologicalConnectivity
  - L2_SemanticCoherence
  - L3_MonsterSymmetryConfinement

# Audit Tracing
audit_config:
  emit_crmf_witness: true
  anchor_to_blockchain: true
  frequency: "per_transition"
  # Ensures public querying of the distance from perfect Monster symmetry
  expose_rta_endpoints: true
