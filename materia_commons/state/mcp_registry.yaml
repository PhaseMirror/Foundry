servers:
  - id: multiplicity-mcp-python
    name: "Python MCP Policy Proxy"
    transport: "stdio"
    command: "python3"
    args:
      - "mcp_server/python_proxy.py"
    hash: "none"
    trust: "Internal"
    governed: true
    alp_required: true
    sat_ttl_seconds: 5
    capabilities:
      - "execute"
  - id: mcp-github
    name: "GitHub MCP Adapter"
    transport: "stdio"
    command: "python3"
    args:
      - "mcp_server/github_adapter.py"
    hash: "none"
    trust: "External"
    governed: true
    alp_required: true
    sat_ttl_seconds: 60
    capabilities:
      - "execute"
