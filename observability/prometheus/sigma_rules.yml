groups:
  - name: sigma-governance
    rules:
      - alert: HighDissonanceRate
        expr: rate(sigma_traps_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High dissonance trap rate in Sigma Kernel"
          description: "{{ $value }} traps/sec – check τ_R / L_eff vs Lean bounds (Rpi ≤ 7, λ₁ positivity)"

      - alert: DeserializationLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(sigma_deser_latency_ms_bucket[5m])) by (le)) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Deserialization latency spike"
          description: "P95 latency {{ $value }} ms – review Postcard/Lean export"

      - alert: ThresholdValidationFailures
        expr: rate(sigma_validation_failures_total[5m]) > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Lean threshold validation failures"
          description: "Bounds violation (Rpi, λ₁, atlas) – immediate investigation"

      - alert: LowPassRate
        expr: rate(sigma_passes_total[5m]) / (rate(sigma_passes_total[5m]) + rate(sigma_traps_total[5m])) < 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low governed pass rate"
          description: "Pass rate below 90% – Phase Mirror dissonance rising"
