<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRTM Language Playground | PhaseMirror</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <header class="app-header glass">
        <div class="header-logo">
            <span class="logo-icon">▲</span>
            <h1>PIRTM <span class="logo-accent">Playground</span></h1>
        </div>
        <div class="header-actions">
            <button id="btn-compile" class="btn btn-primary">
                Compile & Run <span class="kbd-shortcut">⌘+Enter</span>
            </button>
            <button id="btn-docs" class="btn btn-secondary">Documentation</button>
        </div>
    </header>

    <main class="app-layout">
        <section class="editor-pane glass pane">
            <div class="pane-header">
                <h2>Source Code</h2>
                <div class="pane-actions">
                    <span class="status-badge status-ready" id="status-indicator">● Ready</span>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="code-editor" spellcheck="false" placeholder="let strata = Ap(7) * Succ(Ap(3));"></textarea>
            </div>
        </section>

        <section class="output-pane pane glass">
            <div class="pane-header">
                <h2>MLIR Lowering & Output</h2>
                <div class="pane-actions">
                    <button class="btn-icon" title="Clear Output" id="btn-clear">⎚</button>
                </div>
            </div>
            <div class="output-container" id="output-container">
                <div class="output-placeholder">
                    <p>Enter PIRTM code on the left and click <strong>Compile & Run</strong> to generate MLIR.</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
