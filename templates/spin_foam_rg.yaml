version: "1.1"
description: "RG-flow parameters for Multiplicity-stable Spin-Foam dynamics"

flow_parameters:
  truncation_limit: 108 # Corresponds to the 108-cycle benchmark
  convergence_budget: 1e-6
  rescaling_factor: 0.999

prime_weights:
  p2: 0.500
  p3: 0.333
  p5: 0.167
  p_default_decay: 0.05

dynamics:
  rg_fixed_point_target: "Einstein-Hilbert"
  coupling_mode: "non-abelian"
  enforce_boundedness: true
