[workspace]

[package]
name = "agios-ingress-spine"
version = "1.0.0-alpha"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.24"
rustls = "0.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
webpki-roots = "0.25"
rustls-pemfile = "1.0"
sha2 = "0.10.9"
thiserror = "2.0"
num-bigint = { version = "0.4", features = ["serde"] }
num-traits = "0.2"
sha3 = "0.10"
